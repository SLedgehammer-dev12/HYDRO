name: Release App

on:
  push:
    tags:
      - "hidrostatik-test-v*"
  workflow_dispatch:
    inputs:
      pre_release:
        description: 'Pre-release olarak isaretle'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\requirements-dev.txt

      - name: Build release package
        run: |
          powershell -ExecutionPolicy Bypass -File .\build_exe.ps1

      - name: Verify build artifacts
        shell: pwsh
        run: |
          $exe = Get-ChildItem -LiteralPath .\release -Filter '*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) { throw "No .exe file found." }
          if ($exe.Length -lt 10MB) { throw "Executable too small ($($exe.Length) bytes)." }
          Write-Host "Artifact verified: $($exe.Name) ($('{0:N0}' -f ($exe.Length / 1MB)) MB)" -ForegroundColor Green

      - name: Resolve release assets
        id: assets
        shell: pwsh
        run: |
          $exe = (Get-ChildItem -LiteralPath .\release -Filter '*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          $sha = (Get-ChildItem -LiteralPath .\release -Filter '*.sha256.txt' | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          $notes = (Get-ChildItem -LiteralPath .\release -Filter '*-RELEASE-NOTES.md' | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          "exe=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "notes=$notes" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload windows assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            ${{ steps.assets.outputs.exe }}
            ${{ steps.assets.outputs.sha }}
            ${{ steps.assets.outputs.notes }}

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build release package
        run: |
          chmod +x ./build_dmg.sh
          ./build_dmg.sh

      - name: Verify build artifacts
        shell: bash
        run: |
          dmg=$(ls release/*.dmg 2>/dev/null | head -n 1)
          if [ -z "$dmg" ]; then echo "ERROR: No .dmg file found."; exit 1; fi
          size=$(du -sm "$dmg" | cut -f1)
          if [ "$size" -lt 10 ]; then echo "ERROR: DMG too small (${size} MB)."; exit 1; fi
          echo "Artifact verified: $(basename "$dmg") (${size} MB)"

      - name: Resolve release assets
        id: assets
        shell: bash
        run: |
          dmg=$(ls release/*.dmg | head -n 1)
          sha=$(ls release/*.sha256.txt | head -n 1)
          notes=$(ls release/*-RELEASE-NOTES.md | head -n 1)
          echo "dmg=$dmg" >> $GITHUB_OUTPUT
          echo "sha=$sha" >> $GITHUB_OUTPUT
          echo "notes=$notes" >> $GITHUB_OUTPUT

      - name: Upload macos assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            ${{ steps.assets.outputs.dmg }}
            ${{ steps.assets.outputs.sha }}
            ${{ steps.assets.outputs.notes }}

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: windows-assets
          path: windows-release

      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: macos-assets
          path: macos-release

      - name: Create unified release notes
        run: |
          echo "# Hidrostatik Test Degerlendirme Release" > unified-notes.md
          echo "" >> unified-notes.md
          echo "## Yenilikler (Changelog)" >> unified-notes.md
          echo "En güncel yenilikleri ve tüm sürüm geçmişini görmek için [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) dosyasına göz atabilirsiniz." >> unified-notes.md
          echo "" >> unified-notes.md
          echo "### Windows Sürümü" >> unified-notes.md
          cat windows-release/*-RELEASE-NOTES.md | grep -v "#" >> unified-notes.md || true
          echo "" >> unified-notes.md
          echo "### macOS Sürümü" >> unified-notes.md
          cat macos-release/*-RELEASE-NOTES.md | grep -v "#" >> unified-notes.md || true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-release/*.exe
            windows-release/*.sha256.txt
            macos-release/*.dmg
            macos-release/*.sha256.txt
          body_path: unified-notes.md
          prerelease: ${{ github.event.inputs.pre_release == 'true' }}
