name: Windows Release

on:
  push:
    tags:
      - "hidrostatik-test-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\requirements-dev.txt

      - name: Build release package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build_exe.ps1

      - name: Resolve release assets
        id: assets
        shell: pwsh
        run: |
          $zip = (Get-ChildItem -LiteralPath .\release -Filter '*.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          $sha = (Get-ChildItem -LiteralPath .\release -Filter '*.sha256.txt' | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          $notes = (Get-ChildItem -LiteralPath .\release -Filter '*-RELEASE-NOTES.md' | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "notes=$notes" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            ${{ steps.assets.outputs.zip }}
            ${{ steps.assets.outputs.sha }}
            ${{ steps.assets.outputs.notes }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.assets.outputs.zip }}
            ${{ steps.assets.outputs.sha }}
          body_path: ${{ steps.assets.outputs.notes }}
